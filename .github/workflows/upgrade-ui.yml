name: Upgrade UI And History

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/upgrade-ui.yml"

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upgrade app files
        run: |
          mkdir -p app

          cat > app/layout.tsx <<'EOF'
          import type { Metadata } from "next";
          import type { ReactNode } from "react";
          import "katex/dist/katex.min.css";
          import "./globals.css";

          export const metadata: Metadata = {
            title: "Persian RTL Markdown Fixer",
            description: "Clean Persian RTL Markdown with safe LTR code, links and math."
          };

          export default function RootLayout({ children }: { children: ReactNode }) {
            return (
              <html lang="fa" dir="rtl">
                <body>{children}</body>
              </html>
            );
          }
          EOF

          cat > app/page.tsx <<'EOF'
          "use client";

          import React, { useEffect, useMemo, useRef, useState } from "react";
          import type { Components } from "react-markdown";
          import ReactMarkdown from "react-markdown";
          import remarkGfm from "remark-gfm";
          import remarkMath from "remark-math";
          import rehypeKatex from "rehype-katex";
          import rehypeSanitize from "rehype-sanitize";

          type HistoryItem = {
            id: string;
            title: string;
            content: string;
            createdAt: number;
            updatedAt: number;
            pinned: boolean;
          };

          const sample = `English at the beginning نباید باعث شود کل جمله چپ‌به‌راست شود.

          این یک متن فارسی است که وسطش API, React, Next.js, file/path/example.ts و email@example.com داریم.

          فرمول inline: $E = mc^2$

          فرمول بلاکی:

          $$
          \\int_0^1 x^2 dx = \\frac{1}{3}
          $$

          کد باید چپ‌به‌راست بماند:

          \`\`\`ts
          function greet(name: string) {
            return \`Hello \${name}\`;
          }
          \`\`\`

          - آیتم فارسی با کلمه English
          - لینک: https://example.com/docs/getting-started
          `;

          const STORAGE_KEY = "rtl-markdown-fixer-history-v2";
          const rtlRegex = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/;
          const ltrTokenRegex =
            /(```[\s\S]*?```|`[^`]*`|https?:\/\/[^\s]+|www\.[^\s]+|[\w.+-]+@[\w.-]+\.[A-Za-z]{2,}|[A-Za-z]:\\[^\s]+|\/[A-Za-z0-9._~:/?#\[\]@!$&'()*+,;=%-]+|[A-Za-z][A-Za-z0-9._~:/?#\[\]@!$&'()*+,;=%-]{1,})/g;

          function makeId() {
            return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
          }

          function collectText(node: React.ReactNode): string {
            if (typeof node === "string" || typeof node === "number") return String(node);
            if (Array.isArray(node)) return node.map(collectText).join("");
            if (React.isValidElement<{ children?: React.ReactNode }>(node)) {
              return collectText(node.props.children);
            }
            return "";
          }

          function dirFrom(children: React.ReactNode): "rtl" | "ltr" {
            return rtlRegex.test(collectText(children)) ? "rtl" : "ltr";
          }

          function prepareCopy(text: string) {
            return text.normalize("NFC").replace(ltrTokenRegex, (match) => `\u2066${match}\u2069`);
          }

          function createTitle(content: string) {
            const firstLine = content
              .split("\n")
              .map((line) => line.trim())
              .find(Boolean);

            if (!firstLine) return "متن بدون عنوان";
            return firstLine.length > 44 ? `${firstLine.slice(0, 44)}...` : firstLine;
          }

          function formatTime(value: number) {
            return new Intl.DateTimeFormat("fa-IR", {
              month: "short",
              day: "numeric",
              hour: "2-digit",
              minute: "2-digit"
            }).format(value);
          }

          export default function Home() {
            const [markdown, setMarkdown] = useState(sample);
            const [toast, setToast] = useState("");
            const [historyOpen, setHistoryOpen] = useState(false);
            const [history, setHistory] = useState<HistoryItem[]>([]);
            const [activeId, setActiveId] = useState<string | null>(null);
            const [query, setQuery] = useState("");
            const [renamingId, setRenamingId] = useState<string | null>(null);
            const [renameValue, setRenameValue] = useState("");
            const previewRef = useRef<HTMLDivElement>(null);

            const stats = useMemo(() => {
              const lines = markdown.length ? markdown.split("\n").length : 0;
              const words = markdown.trim() ? markdown.trim().split(/\s+/).length : 0;
              return { chars: markdown.length, lines, words };
            }, [markdown]);

            const filteredHistory = useMemo(() => {
              const cleanQuery = query.trim().toLowerCase();
              return history
                .filter((item) => {
                  if (!cleanQuery) return true;
                  return (
                    item.title.toLowerCase().includes(cleanQuery) ||
                    item.content.toLowerCase().includes(cleanQuery)
                  );
                })
                .sort((a, b) => Number(b.pinned) - Number(a.pinned) || b.updatedAt - a.updatedAt);
            }, [history, query]);

            useEffect(() => {
              try {
                const saved = window.localStorage.getItem(STORAGE_KEY);
                if (saved) setHistory(JSON.parse(saved) as HistoryItem[]);
              } catch {
                setHistory([]);
              }
            }, []);

            useEffect(() => {
              window.localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(0, 60)));
            }, [history]);

            useEffect(() => {
              const clean = markdown.trim();
              if (!clean) return;

              const timeout = window.setTimeout(() => {
                setHistory((current) => {
                  const now = Date.now();

                  if (activeId) {
                    return current.map((item) =>
                      item.id === activeId
                        ? {
                            ...item,
                            content: markdown,
                            title: item.title || createTitle(markdown),
                            updatedAt: now
                          }
                        : item
                    );
                  }

                  const latest = current[0];
                  if (latest && !latest.pinned && latest.content === markdown) return current;

                  const next: HistoryItem = {
                    id: makeId(),
                    title: createTitle(markdown),
                    content: markdown,
                    createdAt: now,
                    updatedAt: now,
                    pinned: false
                  };

                  setActiveId(next.id);
                  return [next, ...current].slice(0, 60);
                });
              }, 1400);

              return () => window.clearTimeout(timeout);
            }, [markdown, activeId]);

            async function copy(value: string, label: string) {
              await navigator.clipboard.writeText(value);
              setToast(`${label} کپی شد`);
              window.setTimeout(() => setToast(""), 1800);
            }

            function manualSave() {
              const now = Date.now();
              const next: HistoryItem = {
                id: makeId(),
                title: createTitle(markdown),
                content: markdown,
                createdAt: now,
                updatedAt: now,
                pinned: false
              };

              setHistory((current) => [next, ...current].slice(0, 60));
              setActiveId(next.id);
              setToast("در تاریخچه ذخیره شد");
              window.setTimeout(() => setToast(""), 1800);
            }

            function openHistoryItem(item: HistoryItem) {
              setMarkdown(item.content);
              setActiveId(item.id);
              setHistoryOpen(false);
              setToast("از تاریخچه باز شد");
              window.setTimeout(() => setToast(""), 1600);
            }

            function deleteHistoryItem(id: string) {
              setHistory((current) => current.filter((item) => item.id !== id));
              if (activeId === id) setActiveId(null);
            }

            function togglePin(id: string) {
              setHistory((current) =>
                current.map((item) => (item.id === id ? { ...item, pinned: !item.pinned } : item))
              );
            }

            function startRename(item: HistoryItem) {
              setRenamingId(item.id);
              setRenameValue(item.title);
            }

            function commitRename(id: string) {
              const nextTitle = renameValue.trim() || "متن بدون عنوان";
              setHistory((current) =>
                current.map((item) =>
                  item.id === id ? { ...item, title: nextTitle, updatedAt: Date.now() } : item
                )
              );
              setRenamingId(null);
              setRenameValue("");
            }

            const components: Components = {
              p: ({ children }) => <p dir={dirFrom(children)}>{children}</p>,
              li: ({ children }) => <li dir={dirFrom(children)}>{children}</li>,
              h1: ({ children }) => <h1 dir={dirFrom(children)}>{children}</h1>,
              h2: ({ children }) => <h2 dir={dirFrom(children)}>{children}</h2>,
              h3: ({ children }) => <h3 dir={dirFrom(children)}>{children}</h3>,
              blockquote: ({ children }) => <blockquote dir={dirFrom(children)}>{children}</blockquote>,
              a: ({ children, href }) => (
                <a href={href} dir="ltr" target="_blank" rel="noreferrer">
                  {children}
                </a>
              ),
              code: ({ children, className }) => (
                <code className={className} dir="ltr">
                  {children}
                </code>
              ),
              pre: ({ children }) => <pre dir="ltr">{children}</pre>
            };

            return (
              <main className="page">
                <div className="scene" aria-hidden="true">
                  <div className="mesh mesh-a" />
                  <div className="mesh mesh-b" />
                  <div className="mesh mesh-c" />

                  <div className="orb orb-one">{"{ }"}</div>
                  <div className="orb orb-two">∑</div>
                  <div className="orb orb-three">π</div>
                  <div className="orb orb-four">AI</div>

                  <div className="network">
                    <span className="node n1" />
                    <span className="node n2" />
                    <span className="node n3" />
                    <span className="node n4" />
                    <span className="node n5" />
                    <span className="line l1" />
                    <span className="line l2" />
                    <span className="line l3" />
                    <span className="line l4" />
                  </div>

                  <div className="code-rain code-one">const dir = &quot;rtl&quot;</div>
                  <div className="code-rain code-two">E = mc²</div>
                  <div className="code-rain code-three">Markdown.render()</div>
                </div>

                <div className="shell">
                  <header className="hero">
                    <div className="hero-content">
                      <span className="badge">Persian RTL • Markdown • LaTeX • Code</span>
                      <h1>مرتب‌ساز متن فارسی برای خروجی هوش مصنوعی</h1>
                      <p className="lead">
                        متن فارسی را وارد کن و خروجی تمیز، خوانا و درست بگیر؛ کد، لینک، ایمیل،
                        مسیر فایل، عبارت‌های انگلیسی و فرمول‌های ریاضی بدون به‌هم‌ریختگی چپ‌به‌راست
                        نمایش داده می‌شوند.
                      </p>

                      <div className="hero-actions">
                        <button className="btn primary" onClick={() => setHistoryOpen(true)}>
                          باز کردن تاریخچه
                        </button>
                        <button className="btn" onClick={manualSave}>
                          ذخیره در تاریخچه
                        </button>
                      </div>
                    </div>

                    <div className="status-card">
                      <span>وضعیت متن</span>
                      <strong>{stats.chars.toLocaleString("fa-IR")}</strong>
                      <small>کاراکتر</small>
                      <div className="mini-stats">
                        <b>{stats.lines.toLocaleString("fa-IR")} خط</b>
                        <b>{stats.words.toLocaleString("fa-IR")} کلمه</b>
                      </div>
                    </div>
                  </header>

                  <section className="workspace">
                    <div className="panel editor-panel">
                      <div className="panel-head">
                        <div>
                          <h2 className="panel-title">متن ورودی</h2>
                          <p className="panel-subtitle">متن، Markdown، کد یا فرمول را اینجا قرار بده.</p>
                        </div>
                        <div className="actions">
                          <button className="btn" onClick={() => { setMarkdown(sample); setActiveId(null); }}>
                            نمونه
                          </button>
                          <button className="btn danger" onClick={() => { setMarkdown(""); setActiveId(null); }}>
                            پاک کردن
                          </button>
                        </div>
                      </div>
                      <textarea
                        value={markdown}
                        onChange={(event) => setMarkdown(event.target.value)}
                        spellCheck={false}
                        placeholder="متن فارسی، Markdown، کد یا فرمول را اینجا وارد کن..."
                      />
                    </div>

                    <div className="panel preview-panel">
                      <div className="panel-head">
                        <div>
                          <h2 className="panel-title">خروجی تمیز</h2>
                          <p className="panel-subtitle">پیش‌نمایش زنده با جداسازی RTL و LTR.</p>
                        </div>
                        <div className="actions">
                          <button className="btn primary" onClick={() => copy(prepareCopy(markdown), "متن")}>
                            کپی متن
                          </button>
                          <button className="btn" onClick={() => copy(markdown, "Markdown")}>
                            کپی Markdown
                          </button>
                          <button className="btn" onClick={() => copy(previewRef.current?.innerHTML ?? "", "HTML")}>
                            کپی HTML
                          </button>
                        </div>
                      </div>

                      <div className="preview" ref={previewRef}>
                        <ReactMarkdown
                          remarkPlugins={[remarkGfm, remarkMath]}
                          rehypePlugins={[rehypeSanitize, rehypeKatex]}
                          components={components}
                        >
                          {markdown}
                        </ReactMarkdown>
                      </div>
                    </div>
                  </section>

                  <div className="toast">{toast}</div>
                </div>

                <button className="floating-history" onClick={() => setHistoryOpen(true)}>
                  تاریخچه
                  <span>{history.length.toLocaleString("fa-IR")}</span>
                </button>

                {historyOpen && <button className="drawer-backdrop" onClick={() => setHistoryOpen(false)} aria-label="بستن تاریخچه" />}

                <aside className={`history-drawer ${historyOpen ? "open" : ""}`} aria-hidden={!historyOpen}>
                  <div className="drawer-head">
                    <div>
                      <h2>تاریخچه</h2>
                      <p>ذخیره محلی روی همین مرورگر</p>
                    </div>
                    <button className="icon-btn" onClick={() => setHistoryOpen(false)} aria-label="بستن">
                      ×
                    </button>
                  </div>

                  <div className="drawer-tools">
                    <input
                      value={query}
                      onChange={(event) => setQuery(event.target.value)}
                      placeholder="جستجو در تاریخچه..."
                    />
                    <button className="btn primary" onClick={manualSave}>
                      ذخیره فعلی
                    </button>
                  </div>

                  <div className="history-list">
                    {filteredHistory.length === 0 ? (
                      <div className="empty-state">
                        هنوز چیزی در تاریخچه نیست یا نتیجه‌ای برای جستجو پیدا نشد.
                      </div>
                    ) : (
                      filteredHistory.map((item) => (
                        <article className={`history-item ${activeId === item.id ? "active" : ""}`} key={item.id}>
                          <div className="history-main" onClick={() => openHistoryItem(item)}>
                            {renamingId === item.id ? (
                              <input
                                className="rename-input"
                                value={renameValue}
                                onChange={(event) => setRenameValue(event.target.value)}
                                onClick={(event) => event.stopPropagation()}
                                onKeyDown={(event) => {
                                  if (event.key === "Enter") commitRename(item.id);
                                  if (event.key === "Escape") setRenamingId(null);
                                }}
                                autoFocus
                              />
                            ) : (
                              <h3>{item.pinned ? "★ " : ""}{item.title}</h3>
                            )}
                            <p>{item.content.slice(0, 120)}</p>
                            <small>{formatTime(item.updatedAt)}</small>
                          </div>

                          <div className="history-actions">
                            {renamingId === item.id ? (
                              <button className="tiny-btn" onClick={() => commitRename(item.id)}>ثبت</button>
                            ) : (
                              <button className="tiny-btn" onClick={() => startRename(item)}>نام</button>
                            )}
                            <button className="tiny-btn" onClick={() => togglePin(item.id)}>
                              {item.pinned ? "برداشتن" : "پین"}
                            </button>
                            <button className="tiny-btn danger" onClick={() => deleteHistoryItem(item.id)}>
                              حذف
                            </button>
                          </div>
                        </article>
                      ))
                    )}
                  </div>
                </aside>
              </main>
            );
          }
          EOF

          cat > app/globals.css <<'EOF'
       
