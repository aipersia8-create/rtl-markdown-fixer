name: Bootstrap RTL Markdown Fixer

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/bootstrap.yml"

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create project files
        run: |
          mkdir -p app

          cat > package.json <<'EOF'
          {
            "name": "rtl-markdown-fixer",
            "version": "1.0.0",
            "private": true,
            "scripts": {
              "dev": "next dev",
              "build": "next build",
              "start": "next start",
              "lint": "tsc --noEmit"
            },
            "dependencies": {
              "katex": "^0.17.0",
              "next": "^16.2.9",
              "react": "^19.2.7",
              "react-dom": "^19.2.7",
              "react-markdown": "^10.1.0",
              "rehype-katex": "^7.0.1",
              "rehype-sanitize": "^6.0.0",
              "remark-gfm": "^4.0.1",
              "remark-math": "^6.0.0"
            },
            "devDependencies": {
              "@types/node": "^25.9.3",
              "@types/react": "^19.2.7",
              "@types/react-dom": "^19.2.3",
              "typescript": "^6.0.3"
            }
          }
          EOF

          cat > next.config.ts <<'EOF'
          import type { NextConfig } from "next";

          const nextConfig: NextConfig = {};

          export default nextConfig;
          EOF

          cat > tsconfig.json <<'EOF'
          {
            "compilerOptions": {
              "target": "ES2018",
              "lib": ["dom", "dom.iterable", "esnext"],
              "allowJs": true,
              "skipLibCheck": true,
              "strict": true,
              "noEmit": true,
              "esModuleInterop": true,
              "module": "esnext",
              "moduleResolution": "bundler",
              "resolveJsonModule": true,
              "isolatedModules": true,
              "jsx": "react-jsx",
              "incremental": true,
              "plugins": [{ "name": "next" }]
            },
            "include": ["next-env.d.ts", "**/*.ts", "**/*.tsx", ".next/types/**/*.ts"],
            "exclude": ["node_modules"]
          }
          EOF

          cat > next-env.d.ts <<'EOF'
          /// <reference types="next" />
          /// <reference types="next/image-types/global" />

          // This file is auto-generated by Next.js.
          EOF

          cat > .gitignore <<'EOF'
          node_modules
          .next
          out
          .vercel
          .env*
          EOF

          cat > README.md <<'EOF'
          # RTL Markdown Fixer

          ابزار وب برای نمایش تمیز متن فارسی/عربی راست‌به‌چپ همراه با Markdown، کد، لینک، ایمیل و فرمول LaTeX.

          ## Deploy

          این پروژه آماده Deploy روی Vercel است.

          - Framework: Next.js
          - Build command: `npm run build`
          - Output: Next.js default
          - Environment variables: none
          EOF

          cat > app/layout.tsx <<'EOF'
          import type { Metadata } from "next";
          import type { ReactNode } from "react";
          import "katex/dist/katex.min.css";
          import "./globals.css";

          export const metadata: Metadata = {
            title: "RTL Markdown Fixer",
            description: "Clean RTL Persian and Arabic Markdown with safe LTR code, links and math."
          };

          export default function RootLayout({ children }: { children: ReactNode }) {
            return (
              <html lang="fa" dir="rtl">
                <body>{children}</body>
              </html>
            );
          }
          EOF

          cat > app/globals.css <<'EOF'
          :root {
            color-scheme: dark;
            --bg: #070a12;
            --panel: rgba(255, 255, 255, 0.07);
            --panel-strong: rgba(255, 255, 255, 0.11);
            --text: #eef3ff;
            --muted: #a8b0c5;
            --border: rgba(255, 255, 255, 0.14);
            --accent: #8b5cf6;
            --accent-2: #22d3ee;
            --danger: #fb7185;
          }

          * {
            box-sizing: border-box;
          }

          html,
          body {
            margin: 0;
            min-height: 100%;
            background:
              radial-gradient(circle at 20% 10%, rgba(139, 92, 246, 0.28), transparent 34rem),
              radial-gradient(circle at 85% 20%, rgba(34, 211, 238, 0.18), transparent 30rem),
              var(--bg);
            color: var(--text);
            font-family: Tahoma, Arial, sans-serif;
          }

          button,
          textarea {
            font: inherit;
          }

          .page {
            min-height: 100vh;
            padding: 32px 18px;
          }

          .shell {
            max-width: 1240px;
            margin: 0 auto;
          }

          .hero {
            margin-bottom: 22px;
            padding: 26px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
            box-shadow: 0 22px 80px rgba(0,0,0,0.35);
          }

          .badge {
            display: inline-flex;
            gap: 8px;
            align-items: center;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: #dbeafe;
            background: rgba(139,92,246,0.15);
            font-size: 13px;
          }

          h1 {
            margin: 16px 0 10px;
            font-size: clamp(30px, 5vw, 58px);
            line-height: 1.12;
          }

          .lead {
            max-width: 850px;
            margin: 0;
            color: var(--muted);
            line-height: 2;
            font-size: 17px;
          }

          .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
          }

          .panel {
            min-height: 680px;
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            background: var(--panel);
            box-shadow: 0 18px 60px rgba(0,0,0,0.28);
          }

          .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.06);
          }

          .panel-title {
            margin: 0;
            font-size: 15px;
            color: #f8fafc;
          }

          .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
          }

          .btn {
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--panel-strong);
            color: var(--text);
            padding: 9px 12px;
            cursor: pointer;
            transition: 0.18s ease;
          }

          .btn:hover {
            border-color: rgba(139, 92, 246, 0.75);
            transform: translateY(-1px);
          }

          .btn.primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            border: 0;
          }

          .btn.danger {
            color: #fecdd3;
            border-color: rgba(251, 113, 133, 0.3);
          }

          textarea {
            width: 100%;
            height: calc(100% - 58px);
            min-height: 620px;
            resize: vertical;
            border: 0;
            outline: 0;
            padding: 22px;
            background: rgba(0,0,0,0.16);
            color: var(--text);
            line-height: 2;
            font-size: 16px;
            direction: rtl;
            unicode-bidi: plaintext;
          }

          .preview {
            min-height: 620px;
            padding: 22px;
            line-height: 2;
            overflow-wrap: anywhere;
          }

          .preview :where(p, li, blockquote, h1, h2, h3, h4, h5, h6) {
            text-align: start;
            unicode-bidi: plaintext;
          }

          .preview :where(pre, code, kbd, samp, .katex, .katex-display) {
            direction: ltr !important;
            unicode-bidi: isolate !important;
            text-align: left;
            font-family: Consolas, Monaco, "Courier New", monospace;
          }

          .preview pre {
            overflow: auto;
            padding: 16px;
            border-radius: 16px;
            background: rgba(0,0,0,0.45);
            border: 1px solid var(--border);
            line-height: 1.75;
          }

          .preview code {
            padding: 2px 6px;
            border-radius: 8px;
            background: rgba(255,255,255,0.10);
          }

          .preview pre code {
            padding: 0;
            background: transparent;
          }

          .preview a {
            direction: ltr;
            unicode-bidi: isolate;
            color: #67e8f9;
          }

          .preview table {
            width: 100%;
            border-collapse: collapse;
            overflow: auto;
          }

          .preview th,
          .preview td {
            border: 1px solid var(--border);
            padding: 8px 10px;
          }

          .toast {
            margin-top: 14px;
            color: #bbf7d0;
            min-height: 24px;
          }

          @media (max-width: 900px) {
            .grid {
              grid-template-columns: 1fr;
            }

            .panel {
              min-height: auto;
            }

            textarea,
            .preview {
              min-height: 430px;
            }
          }
          EOF

          cat > app/page.tsx <<'EOF'
          "use client";

          import React, { useRef, useState } from "react";
          import type { Components } from "react-markdown";
          import ReactMarkdown from "react-markdown";
          import remarkGfm from "remark-gfm";
          import remarkMath from "remark-math";
          import rehypeKatex from "rehype-katex";
          import rehypeSanitize from "rehype-sanitize";

          const sample = `English at the beginning نباید باعث شود کل جمله چپ‌به‌راست شود.

          این یک متن فارسی است که وسطش API, React, Next.js, file/path/example.ts و email@example.com داریم.

          فرمول inline: $E = mc^2$

          فرمول بلاکی:

          $$
          \\int_0^1 x^2 dx = \\frac{1}{3}
          $$

          کد باید چپ‌به‌راست بماند:

          \`\`\`ts
          function greet(name: string) {
            return \`Hello \${name}\`;
          }
          \`\`\`

          - آیتم فارسی با کلمه English
          - لینک: https://example.com/docs/getting-started
          `;

          const rtlRegex = /[\u0590-\u05FF\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/;
          const ltrTokenRegex =
            /(```[\s\S]*?```|`[^`]*`|https?:\/\/[^\s]+|www\.[^\s]+|[\w.+-]+@[\w.-]+\.[A-Za-z]{2,}|[A-Za-z]:\\[^\s]+|\/[A-Za-z0-9._~:/?#\[\]@!$&'()*+,;=%-]+|[A-Za-z][A-Za-z0-9._~:/?#\[\]@!$&'()*+,;=%-]{1,})/g;

          function collectText(node: React.ReactNode): string {
            if (typeof node === "string" || typeof node === "number") return String(node);
            if (Array.isArray(node)) return node.map(collectText).join("");
            if (React.isValidElement<{ children?: React.ReactNode }>(node)) {
              return collectText(node.props.children);
            }
            return "";
          }

          function dirFrom(children: React.ReactNode): "rtl" | "ltr" {
            return rtlRegex.test(collectText(children)) ? "rtl" : "ltr";
          }

          function prepareCopy(text: string) {
            return text.normalize("NFC").replace(ltrTokenRegex, (match) => `\u2066${match}\u2069`);
          }

          export default function Home() {
            const [markdown, setMarkdown] = useState(sample);
            const [toast, setToast] = useState("");
            const previewRef = useRef<HTMLDivElement>(null);

            async function copy(value: string, label: string) {
              await navigator.clipboard.writeText(value);
              setToast(`${label} کپی شد`);
              window.setTimeout(() => setToast(""), 1800);
            }

            const components: Components = {
              p: ({ children }) => <p dir={dirFrom(children)}>{children}</p>,
              li: ({ children }) => <li dir={dirFrom(children)}>{children}</li>,
              h1: ({ children }) => <h1 dir={dirFrom(children)}>{children}</h1>,
              h2: ({ children }) => <h2 dir={dirFrom(children)}>{children}</h2>,
              h3: ({ children }) => <h3 dir={dirFrom(children)}>{children}</h3>,
              blockquote: ({ children }) => <blockquote dir={dirFrom(children)}>{children}</blockquote>,
              a: ({ children, href }) => (
                <a href={href} dir="ltr" target="_blank" rel="noreferrer">
                  {children}
                </a>
              ),
              code: ({ children, className }) => (
                <code className={className} dir="ltr">
                  {children}
                </code>
              ),
              pre: ({ children }) => <pre dir="ltr">{children}</pre>
            };

            return (
              <main className="page">
                <div className="shell">
                  <section className="hero">
                    <span className="badge">RTL / Markdown / LaTeX / Code</span>
                    <h1>مرتب‌ساز متن فارسی و عربی در خروجی هوش مصنوعی</h1>
                    <p className="lead">
                      متن خام را وارد کن؛ پیش‌نمایش، فارسی و عربی را راست‌به‌چپ نگه می‌دارد و کد،
                      لینک، ایمیل، مسیر فایل، عبارت‌های انگلیسی و فرمول‌های ریاضی را چپ‌به‌راست و
                      خوانا نمایش می‌دهد.
                    </p>
                  </section>

                  <section className="grid">
                    <div className="panel">
                      <div className="panel-head">
                        <h2 className="panel-title">متن ورودی</h2>
                        <div className="actions">
                          <button className="btn" onClick={() => setMarkdown(sample)}>نمونه</button>
                          <button className="btn danger" onClick={() => setMarkdown("")}>پاک کردن</button>
                        </div>
                      </div>
                      <textarea
                        value={markdown}
                        onChange={(event) => setMarkdown(event.target.value)}
                        spellCheck={false}
                        placeholder="متن فارسی/عربی، Markdown، کد یا فرمول را اینجا وارد کن..."
                      />
                    </div>

                    <div className="panel">
                      <div className="panel-head">
                        <h2 className="panel-title">خروجی تمیز</h2>
                        <div className="actions">
                          <button className="btn primary" onClick={() => copy(prepareCopy(markdown), "متن")}>
                            کپی متن
                          </button>
                          <button className="btn" onClick={() => copy(markdown, "Markdown")}>کپی Markdown</button>
                          <button className="btn" onClick={() => copy(previewRef.current?.innerHTML ?? "", "HTML")}>
                            کپی HTML
                          </button>
                        </div>
                      </div>

                      <div className="preview" ref={previewRef}>
                        <ReactMarkdown
                          remarkPlugins={[remarkGfm, remarkMath]}
                          rehypePlugins={[rehypeSanitize, rehypeKatex]}
                          components={components}
                        >
                          {markdown}
                        </ReactMarkdown>
                      </div>
                    </div>
                  </section>

                  <div className="toast">{toast}</div>
                </div>
              </main>
            );
          }
          EOF

      - name: Commit generated app
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Bootstrap RTL Markdown Fixer app"
            git push
          fi
