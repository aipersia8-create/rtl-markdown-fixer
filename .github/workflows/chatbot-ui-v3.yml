name: Chatbot UI V3

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/chatbot-ui-v3.yml"

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Write chatbot-style app
        run: |
          mkdir -p app

          cat > app/layout.tsx <<'EOF_LAYOUT'
          import type { Metadata } from "next";
          import type { ReactNode } from "react";
          import "katex/dist/katex.min.css";
          import "./globals.css";

          export const metadata: Metadata = {
            title: "Persian RTL Markdown Fixer",
            description: "Chat-style Persian RTL Markdown fixer with safe LTR code, links and math."
          };

          export default function RootLayout({ children }: { children: ReactNode }) {
            return (
              <html lang="fa" dir="rtl">
                <body>{children}</body>
              </html>
            );
          }
          EOF_LAYOUT

          cat > app/page.tsx <<'EOF_PAGE'
          "use client";

          import React, { useEffect, useMemo, useRef, useState } from "react";
          import type { Components } from "react-markdown";
          import ReactMarkdown from "react-markdown";
          import remarkGfm from "remark-gfm";
          import remarkMath from "remark-math";
          import rehypeKatex from "rehype-katex";
          import rehypeSanitize from "rehype-sanitize";

          type ChatEntry = {
            id: string;
            pairId: string;
            role: "user" | "assistant";
            content: string;
            createdAt: number;
          };

          type Conversation = {
            id: string;
            title: string;
            userContent: string;
            assistantContent: string;
            createdAt: number;
            updatedAt: number;
            pinned: boolean;
          };

          const STORAGE_KEY = "persian-rtl-chat-history-v3";

          const sample = `English at the beginning نباید باعث شود کل جمله چپ‌به‌راست شود.

          این یک متن فارسی است که وسطش API, React, Next.js, file/path/example.ts و email@example.com داریم.

          فرمول inline: $E = mc^2$

          فرمول بلاکی:

          $$
          \\int_0^1 x^2 dx = \\frac{1}{3}
          $$

          کد باید چپ‌به‌راست بماند:

          \`\`\`ts
          function greet(name: string) {
            return \`Hello \${name}\`;
          }
          \`\`\`

          - آیتم فارسی با کلمه English
          - لینک: https://example.com/docs/getting-started
          `;

          const introMessage = `سلام! متن فارسی، Markdown، کد، لینک یا فرمولت را بفرست. من خروجی را طوری نمایش می‌دهم که فارسی راست‌به‌چپ بماند و بخش‌های فنی مثل code، URL، email و LaTeX درست چپ‌به‌راست دیده شوند.`;

          const rtlRegex = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/;
          const ltrTokenRegex =
            /(```[\s\S]*?```|`[^`]*`|https?:\/\/[^\s]+|www\.[^\s]+|[\w.+-]+@[\w.-]+\.[A-Za-z]{2,}|[A-Za-z]:\\[^\s]+|\/[A-Za-z0-9._~:/?#\[\]@!$&'()*+,;=%-]+|[A-Za-z][A-Za-z0-9._~:/?#\[\]@!$&'()*+,;=%-]{1,})/g;

          function makeId() {
            return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
          }

          function collectText(node: React.ReactNode): string {
            if (typeof node === "string" || typeof node === "number") return String(node);
            if (Array.isArray(node)) return node.map(collectText).join("");
            if (React.isValidElement<{ children?: React.ReactNode }>(node)) {
              return collectText(node.props.children);
            }
            return "";
          }

          function dirFrom(children: React.ReactNode): "rtl" | "ltr" {
            return rtlRegex.test(collectText(children)) ? "rtl" : "ltr";
          }

          function prepareCopy(text: string) {
            return text.normalize("NFC").replace(ltrTokenRegex, (match) => `\u2066${match}\u2069`);
          }

          function makeTitle(content: string) {
            const firstLine = content
              .split("\n")
              .map((line) => line.trim())
              .find(Boolean);

            if (!firstLine) return "گفت‌وگوی بدون عنوان";
            return firstLine.length > 46 ? `${firstLine.slice(0, 46)}...` : firstLine;
          }

          function formatDate(value: number) {
            if (!value) return "";
            return new Intl.DateTimeFormat("fa-IR", {
              month: "short",
              day: "numeric",
              hour: "2-digit",
              minute: "2-digit"
            }).format(value);
          }

          export default function Home() {
            const [draft, setDraft] = useState("");
            const [toast, setToast] = useState("");
            const [historyOpen, setHistoryOpen] = useState(false);
            const [conversations, setConversations] = useState<Conversation[]>([]);
            const [activeConversationId, setActiveConversationId] = useState<string | null>(null);
            const [query, setQuery] = useState("");
            const [renamingId, setRenamingId] = useState<string | null>(null);
            const [renameValue, setRenameValue] = useState("");
            const [chatEntries, setChatEntries] = useState<ChatEntry[]>([
              {
                id: "intro",
                pairId: "intro",
                role: "assistant",
                content: introMessage,
                createdAt: 0
              }
            ]);

            const chatEndRef = useRef<HTMLDivElement>(null);
            const textareaRef = useRef<HTMLTextAreaElement>(null);

            const latestAssistant = useMemo(() => {
              return [...chatEntries].reverse().find((entry) => entry.role === "assistant");
            }, [chatEntries]);

            const stats = useMemo(() => {
              const content = latestAssistant?.content ?? "";
              const trimmed = content.trim();

              return {
                chats: conversations.length,
                chars: content.length,
                lines: content ? content.split("\n").length : 0,
                words: trimmed ? trimmed.split(/\s+/).length : 0
              };
            }, [conversations.length, latestAssistant?.content]);

            const filteredConversations = useMemo(() => {
              const q = query.trim().toLowerCase();

              return conversations
                .filter((item) => {
                  if (!q) return true;
                  return (
                    item.title.toLowerCase().includes(q) ||
                    item.userContent.toLowerCase().includes(q) ||
                    item.assistantContent.toLowerCase().includes(q)
                  );
                })
                .sort((a, b) => Number(b.pinned) - Number(a.pinned) || b.updatedAt - a.updatedAt);
            }, [conversations, query]);

            useEffect(() => {
              try {
                const saved = window.localStorage.getItem(STORAGE_KEY);
                if (saved) setConversations(JSON.parse(saved) as Conversation[]);
              } catch {
                setConversations([]);
              }
            }, []);

            useEffect(() => {
              window.localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations.slice(0, 80)));
            }, [conversations]);

            useEffect(() => {
              chatEndRef.current?.scrollIntoView({ behavior: "smooth", block: "end" });
            }, [chatEntries]);

            async function copy(value: string, label: string) {
              await navigator.clipboard.writeText(value);
              setToast(`${label} کپی شد`);
              window.setTimeout(() => setToast(""), 1600);
            }

            function createAssistantOutput(input: string) {
              return input.trim();
            }

            function submitMessage(value?: string) {
              const clean = (value ?? draft).trim();
              if (!clean) return;

              const now = Date.now();
              const pairId = makeId();
              const assistantOutput = createAssistantOutput(clean);

              const userMessage: ChatEntry = {
                id: makeId(),
                pairId,
                role: "user",
                content: clean,
                createdAt: now
              };

              const assistantMessage: ChatEntry = {
                id: makeId(),
                pairId,
                role: "assistant",
                content: assistantOutput,
                createdAt: now
              };

              const conversation: Conversation = {
                id: pairId,
                title: makeTitle(clean),
                userContent: clean,
                assistantContent: assistantOutput,
                createdAt: now,
                updatedAt: now,
                pinned: false
              };

              setChatEntries((current) => {
                const withoutIntro =
                  current.length === 1 && current[0]?.id === "intro" ? [] : current;
                return [...withoutIntro, userMessage, assistantMessage];
              });

              setConversations((current) => [conversation, ...current].slice(0, 80));
              setActiveConversationId(pairId);
              setDraft("");
              textareaRef.current?.focus();
            }

            function openSample() {
              setDraft(sample);
              textareaRef.current?.focus();
            }

            function clearChat() {
              setChatEntries([
                {
                  id: "intro",
                  pairId: "intro",
                  role: "assistant",
                  content: introMessage,
                  createdAt: 0
                }
              ]);
              setActiveConversationId(null);
              setDraft("");
            }

            function openConversation(item: Conversation) {
              const created = item.updatedAt || item.createdAt;

              setChatEntries([
                {
                  id: `${item.id}-user`,
                  pairId: item.id,
                  role: "user",
                  content: item.userContent,
                  createdAt: created
                },
                {
                  id: `${item.id}-assistant`,
                  pairId: item.id,
                  role: "assistant",
                  content: item.assistantContent,
                  createdAt: created
                }
              ]);

              setActiveConversationId(item.id);
              setHistoryOpen(false);
              setToast("گفت‌وگو باز شد");
              window.setTimeout(() => setToast(""), 1400);
            }

            function deleteConversation(id: string) {
              setConversations((current) => current.filter((item) => item.id !== id));
              if (activeConversationId === id) setActiveConversationId(null);
            }

            function togglePin(id: string) {
              setConversations((current) =>
                current.map((item) => (item.id === id ? { ...item, pinned: !item.pinned } : item))
              );
            }

            function startRename(item: Conversation) {
              setRenamingId(item.id);
              setRenameValue(item.title);
            }

            function finishRename(id: string) {
              const title = renameValue.trim() || "گفت‌وگوی بدون عنوان";

              setConversations((current) =>
                current.map((item) =>
                  item.id === id ? { ...item, title, updatedAt: Date.now() } : item
                )
              );

              setRenamingId(null);
              setRenameValue("");
            }

            const components: Components = {
              p: ({ children }) => <p dir={dirFrom(children)}>{children}</p>,
              li: ({ children }) => <li dir={dirFrom(children)}>{children}</li>,
              h1: ({ children }) => <h1 dir={dirFrom(children)}>{children}</h1>,
              h2: ({ children }) => <h2 dir={dirFrom(children)}>{children}</h2>,
              h3: ({ children }) => <h3 dir={dirFrom(children)}>{children}</h3>,
              blockquote: ({ children }) => <blockquote dir={dirFrom(children)}>{children}</blockquote>,
              a: ({ children, href }) => (
                <a href={href} dir="ltr" target="_blank" rel="noreferrer">
                  {children}
                </a>
              ),
              code: ({ children, className }) => (
                <code className={className} dir="ltr">
                  {children}
                </code>
              ),
              pre: ({ children }) => <pre dir="ltr">{children}</pre>
            };

            return (
              <main className="page">
                <div className="background" aria-hidden="true">
                  <div className="aurora aurora-one" />
                  <div className="aurora aurora-two" />
                  <div className="aurora aurora-three" />
                  <div className="grid-floor" />

                  <div className="ring ring-one" />
                  <div className="ring ring-two" />

                  <div className="floating-chip chip-one">{"{ code }"}</div>
                  <div className="floating-chip chip-two">∑x²</div>
                  <div className="floating-chip chip-three">π</div>
                  <div className="floating-chip chip-four">AI</div>
                  <div className="floating-chip chip-five">RTL</div>

                  <div className="neural-map">
                    <span className="node node-a" />
                    <span className="node node-b" />
                    <span className="node node-c" />
                    <span className="node node-d" />
                    <span className="node node-e" />
                    <span className="edge edge-1" />
                    <span className="edge edge-2" />
                    <span className="edge edge-3" />
                    <span className="edge edge-4" />
                  </div>

                  <div className="code-line code-line-one">const output = fixBidi(input)</div>
                  <div className="code-line code-line-two">E = mc²</div>
                  <div className="code-line code-line-three">Markdown + LaTeX + Code</div>
                </div>

                <section className="app-shell">
                  <header className="topbar">
                    <div>
                      <span className="eyebrow">Persian RTL Assistant</span>
                      <h1>چت‌بات مرتب‌ساز متن فارسی</h1>
                    </div>

                    <div className="top-actions">
                      <button className="btn ghost" onClick={() => setHistoryOpen(true)}>
                        تاریخچه
                        <span className="count">{conversations.length.toLocaleString("fa-IR")}</span>
                      </button>
                      <button className="btn ghost" onClick={clearChat}>
                        پاک کردن گفتگو
                      </button>
                    </div>
                  </header>

                  <div className="status-strip">
                    <div>
                      <span>گفت‌وگوها</span>
                      <strong>{stats.chats.toLocaleString("fa-IR")}</strong>
                    </div>
                    <div>
                      <span>کاراکتر خروجی</span>
                      <strong>{stats.chars.toLocaleString("fa-IR")}</strong>
                    </div>
                    <div>
                      <span>خط</span>
                      <strong>{stats.lines.toLocaleString("fa-IR")}</strong>
                    </div>
                    <div>
                      <span>کلمه</span>
                      <strong>{stats.words.toLocaleString("fa-IR")}</strong>
                    </div>
                  </div>

                  <section className="chat-window" aria-live="polite">
                    {chatEntries.map((entry) => (
                      <article
                        className={`message-row ${entry.role === "user" ? "from-user" : "from-assistant"}`}
                        key={entry.id}
                      >
                        <div className="avatar">
                          {entry.role === "user" ? "تو" : "RTL"}
                        </div>

                        <div className="message-bubble">
                          <div className="message-meta">
                            <span>{entry.role === "user" ? "پیام تو" : "خروجی اصلاح‌شده"}</span>
                            {entry.createdAt ? <time>{formatDate(entry.createdAt)}</time> : null}
                          </div>

                          {entry.role === "user" ? (
                            <p className="user-text">{entry.content}</p>
                          ) : (
                            <>
                              <div className="assistant-summary">
                                <span>Markdown</span>
                                <span>LaTeX</span>
                                <span>Code LTR</span>
                                <span>Persian RTL</span>
                              </div>

                              <div className="rendered-output" id={`render-${entry.id}`}>
                                <ReactMarkdown
                                  remarkPlugins={[remarkGfm, remarkMath]}
                                  rehypePlugins={[rehypeSanitize, rehypeKatex]}
                                  components={components}
                                >
                                  {entry.content}
                                </ReactMarkdown>
                              </div>

                              <details className="raw-details">
                                <summary>نمایش متن خام اصلاح‌شده</summary>
                                <pre dir="rtl">{prepareCopy(entry.content)}</pre>
                              </details>

                              <div className="message-actions">
                                <button className="btn primary" onClick={() => copy(prepareCopy(entry.content), "متن")}>
                                  کپی متن
                                </button>
                                <button className="btn" onClick={() => copy(entry.content, "Markdown")}>
                                  کپی Markdown
                                </button>
                                <button
                                  className="btn"
                                  onClick={() =>
                                    copy(
                                      document.getElementById(`render-${entry.id}`)?.innerHTML ?? "",
                                      "HTML"
                                    )
                                  }
                                >
                                  کپی HTML
                                </button>
                              </div>
                            </>
                          )}
                        </div>
                      </article>
                    ))}
                    <div ref={chatEndRef} />
                  </section>

                  <section className="composer-card">
                    <div className="composer-head">
                      <div>
                        <h2>پیامت را بفرست</h2>
                        <p>متن فارسی، Markdown، کد، لینک، ایمیل یا فرمول LaTeX را وارد کن.</p>
                      </div>
                      <button className="btn ghost" onClick={openSample}>
                        نمونه
                      </button>
                    </div>

                    <div className="composer">
                      <textarea
                        ref={textareaRef}
                        value={draft}
                        onChange={(event) => setDraft(event.target.value)}
                        onKeyDown={(event) => {
                          if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
                            event.preventDefault();
                            submitMessage();
                          }
                        }}
                        spellCheck={false}
                        placeholder="اینجا بنویس... برای ارسال سریع Ctrl + Enter بزن"
                      />
                      <button className="send-btn" onClick={() => submitMessage()}>
                        ارسال
                      </button>
                    </div>

                    <div className="toast">{toast}</div>
                  </section>
                </section>

                {historyOpen && (
                  <button
                    className="drawer-backdrop"
                    onClick={() => setHistoryOpen(false)}
                    aria-label="بستن تاریخچه"
                  />
                )}

                <aside className={`drawer ${historyOpen ? "open" : ""}`} aria-hidden={!historyOpen}>
                  <div className="drawer-head">
                    <div>
                      <h2>تاریخچه گفت‌وگوها</h2>
                      <p>همه چیز فقط روی همین مرورگر ذخیره می‌شود.</p>
                    </div>
                    <button className="close-btn" onClick={() => setHistoryOpen(false)}>
                      ×
                    </button>
                  </div>

                  <div className="drawer-tools">
                    <input
                      value={query}
                      onChange={(event) => setQuery(event.target.value)}
                      placeholder="جستجو در گفت‌وگوها..."
                    />
                    <button className="btn primary" onClick={() => setQuery("")}>
                      پاک کردن جستجو
                    </button>
                  </div>

                  <div className="history-list">
                    {filteredConversations.length === 0 ? (
                      <div className="empty-state">
                        هنوز گفت‌وگویی ذخیره نشده یا نتیجه‌ای برای جستجو پیدا نشد.
                      </div>
                    ) : (
                      filteredConversations.map((item) => (
                        <article
                          className={`history-card ${activeConversationId === item.id ? "active" : ""}`}
                          key={item.id}
                        >
                          <div className="history-content" onClick={() => openConversation(item)}>
                            {renamingId === item.id ? (
                              <input
                                className="rename-input"
                                value={renameValue}
                                onChange={(event) => setRenameValue(event.target.value)}
                                onClick={(event) => event.stopPropagation()}
                                onKeyDown={(event) => {
                                  if (event.key === "Enter") finishRename(item.id);
                                  if (event.key === "Escape") setRenamingId(null);
                                }}
                                autoFocus
                              />
                            ) : (
                              <h3>{item.pinned ? "★ " : ""}{item.title}</h3>
                            )}

                            <p>{item.userContent.slice(0, 130)}</p>
                            <small>{formatDate(item.updatedAt)}</small>
                          </div>

                          <div className="history-actions">
                            {renamingId === item.id ? (
                              <button className="small-btn" onClick={() => finishRename(item.id)}>
                                ثبت
                              </button>
                            ) : (
                              <button className="small-btn" onClick={() => startRename(item)}>
                                تغییر نام
                              </button>
                            )}
                            <button className="small-btn" onClick={() => togglePin(item.id)}>
                              {item.pinned ? "برداشتن پین" : "پین"}
                            </button>
                            <button className="small-btn danger" onClick={() => deleteConversation(item.id)}>
                              حذف
                            </button>
                          </div>
                        </article>
                      ))
                    )}
                  </div>
                </aside>
              </main>
            );
          }
          EOF_PAGE

          cat > app/globals.css <<'EOF_CSS'
          :root {
            color-scheme: dark;
            --bg: #050613;
            --text: #edf3ff;
            --muted: #a8b5d1;
            --muted-2: #73809b;
            --line: rgba(255, 255, 255, 0.15);
            --glass: rgba(8, 13, 28, 0.52);
            --glass-strong: rgba(10, 17, 35, 0.72);
            --bubble: rgba(255, 255, 255, 0.085);
            --bubble-user: rgba(139, 92, 246, 0.22);
            --accent: #8b5cf6;
            --accent-2: #22d3ee;
            --accent-3: #14f195;
            --danger: #fb7185;
            --shadow: 0 26px 90px rgba(0, 0, 0, 0.38);
          }

          * {
            box-sizing: border-box;
          }

          html,
          body {
            margin: 0;
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: Tahoma, Arial, sans-serif;
            overflow-x: hidden;
          }

          button,
          textarea,
          input {
            font: inherit;
          }

          button {
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
          }

          .page {
            position: relative;
            min-height: 100vh;
            overflow: hidden;
            padding: 22px 14px 34px;
          }

          .background {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            perspective: 1000px;
            background:
              radial-gradient(circle at 15% 14%, rgba(139, 92, 246, 0.48), transparent 30rem),
              radial-gradient(circle at 88% 18%, rgba(34, 211, 238, 0.34), transparent 34rem),
              radial-gradient(circle at 44% 92%, rgba(20, 241, 149, 0.18), transparent 32rem),
              linear-gradient(135deg, #02030a, #090d1d 45%, #050613);
          }

          .background::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
              linear-gradient(rgba(255,255,255,0.035), transparent 28%),
              radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.38) 82%);
          }

          .aurora {
            position: absolute;
            width: 44vw;
            height: 44vw;
            min-width: 360px;
            min-height: 360px;
            border-radius: 999px;
            filter: blur(44px);
            opacity: 0.42;
            mix-blend-mode: screen;
            animation: auroraMove 14s ease-in-out infinite alternate;
          }

          .aurora-one {
            top: -12%;
            right: 8%;
            background: rgba(139, 92, 246, 0.45);
          }

          .aurora-two {
            bottom: -18%;
            left: 8%;
            background: rgba(34, 211, 238, 0.42);
            animation-delay: -5s;
          }

          .aurora-three {
            top: 38%;
            left: 35%;
            background: rgba(20, 241, 149, 0.24);
            animation-delay: -9s;
          }

          .grid-floor {
            position: absolute;
            inset: -22%;
            background-image:
              linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
              linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 72px 72px;
            transform: rotateX(63deg) translateY(220px) scale(1.35);
            mask-image: radial-gradient(circle at center, black, transparent 78%);
            animation: floorMove 12s ease-in-out infinite alternate;
          }

          .ring {
            position: absolute;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 999px;
            box-shadow: 0 0 70px rgba(34,211,238,0.15);
            transform-style: preserve-3d;
            animation: ringSpin 16s linear infinite;
          }

          .ring-one {
            top: 16%;
            left: 12%;
            width: 220px;
            height: 220px;
            transform: rotateX(62deg) rotateZ(20deg);
          }

          .ring-two {
            right: 9%;
            bottom: 14%;
            width: 260px;
            height: 260px;
            transform: rotateX(68deg) rotateZ(-18deg);
            animation-delay: -7s;
          }

          .floating-chip {
            position: absolute;
            display: grid;
            place-items: center;
            min-width: 82px;
            height: 82px;
            padding: 0 14px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 24px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 60px rgba(34,211,238,0.16);
            color: rgba(255,255,255,0.74);
            font-weight: 900;
            direction: ltr;
            transform-style: preserve-3d;
            animation: float3d 9s ease-in-out infinite alternate;
          }

          .chip-one { top: 22%; right: 6%; }
          .chip-two { top: 64%; right: 18%; animation-delay: -2s; }
          .chip-three { top: 27%; left: 17%; animation-delay: -4s; }
          .chip-four { bottom: 14%; left: 28%; animation-delay: -6s; }
          .chip-five { top: 54%; left: 7%; animation-delay: -8s; }

          .neural-map {
            position: absolute;
            top: 45%;
            left: 50%;
            width: 430px;
            height: 260px;
            transform: translate(-50%, -50%) rotateX(58deg) rotateZ(-14deg);
            opacity: 0.72;
            animation: neuralPulse 7s ease-in-out infinite alternate;
          }

          .node {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #67e8f9;
            box-shadow: 0 0 26px #22d3ee;
          }

          .node-a { top: 24px; left: 28px; }
          .node-b { top: 92px; left: 168px; background: #a78bfa; box-shadow: 0 0 26px #8b5cf6; }
          .node-c { bottom: 40px; left: 94px; }
          .node-d { top: 58px; right: 78px; background: #86efac; box-shadow: 0 0 26px #14f195; }
          .node-e { bottom: 38px; right: 50px; background: #a78bfa; box-shadow: 0 0 26px #8b5cf6; }

          .edge {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(103,232,249,0.8), transparent);
            transform-origin: left;
          }

          .edge-1 { width: 160px; top: 62px; left: 42px; transform: rotate(26deg); }
          .edge-2 { width: 180px; top: 110px; left: 182px; transform: rotate(-17deg); }
          .edge-3 { width: 150px; top: 180px; left: 108px; transform: rotate(-46deg); }
          .edge-4 { width: 150px; top: 112px; right: 52px; transform: rotate(54deg); }

          .code-line {
            position: absolute;
            direction: ltr;
            font-family: Consolas, Monaco, "Courier New", monospace;
            color: rgba(226, 232, 240, 0.28);
            font-size: 14px;
            transform: rotate(-9deg);
            animation: codeDrift 11s ease-in-out infinite alternate;
          }

          .code-line-one { top: 18%; left: 6%; }
          .code-line-two { bottom: 26%; right: 7%; animation-delay: -3s; }
          .code-line-three { top: 77%; left: 45%; animation-delay: -6s; }

          .app-shell {
            position: relative;
            z-index: 2;
            width: min(1120px, 100%);
            min-height: calc(100vh - 56px);
            margin: 0 auto;
            display: grid;
            grid-template-rows: auto auto 1fr auto;
            gap: 14px;
          }

          .topbar,
          .status-strip,
          .chat-window,
          .composer-card,
          .drawer {
            border: 1px solid var(--line);
            background: rgba(5, 9, 20, 0.42);
            backdrop-filter: blur(14px);
            box-shadow: var(--shadow);
          }

          .topbar {
            border-radius: 28px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
          }

          .eyebrow {
            display: inline-flex;
            padding: 7px 11px;
            border-radius: 999px;
            border: 1px solid rgba(34,211,238,0.32);
            background: rgba(34,211,238,0.1);
            color: #cffafe;
            direction: ltr;
            font-size: 13px;
          }

          h1 {
            margin: 12px 0 0;
            font-size: clamp(27px, 4.5vw, 48px);
            letter-spacing: -0.04em;
            line-height: 1.12;
          }

          .top-actions,
          .message-actions,
          .history-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 9px;
          }

          .btn,
          .small-btn,
          .close-btn {
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
            color: var(--text);
            padding: 9px 12px;
            transition: 0.18s ease;
          }

          .btn:hover,
          .small-btn:hover,
          .close-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(34,211,238,0.75);
          }

          .btn.primary {
            border: 0;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
          }

          .btn.ghost {
            background: rgba(255,255,255,0.065);
          }

          .count {
            display: inline-grid;
            place-items: center;
            min-width: 22px;
            height: 22px;
            margin-right: 8px;
            border-radius: 999px;
            background: rgba(0,0,0,0.25);
            direction: ltr;
          }

          .status-strip {
            border-radius: 22px;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: rgba(5, 9, 20, 0.32);
          }

          .status-strip div {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.045);
          }

          .status-strip span {
            display: block;
            color: var(--muted);
            font-size: 12px;
          }

          .status-strip strong {
            display: block;
            margin-top: 4px;
            direction: ltr;
            text-align: right;
            font-size: 20px;
          }

          .chat-window {
            min-height: 56vh;
            max-height: 64vh;
            overflow: auto;
            border-radius: 28px;
            padding: 22px 16px;
            background: rgba(5, 9, 20, 0.24);
          }

          .message-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 0 0 18px;
          }

          .message-row.from-user {
            flex-direction: row-reverse;
          }

          .avatar {
            flex: 0 0 auto;
            display: grid;
            place-items: center;
            width: 42px;
            height: 42px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(139,92,246,0.9), rgba(34,211,238,0.72));
            color: white;
            font-size: 12px;
            font-weight: 800;
            box-shadow: 0 12px 34px rgba(0,0,0,0.25);
          }

          .from-user .avatar {
            background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(139,92,246,0.42));
          }

          .message-bubble {
            width: min(780px, calc(100% - 54px));
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 26px;
            padding: 14px;
            background: var(--bubble);
            backdrop-filter: blur(8px);
          }

          .from-user .message-bubble {
            background: var(--bubble-user);
            border-top-left-radius: 26px;
            border-top-right-radius: 10px;
          }

          .from-assistant .message-bubble {
            border-top-right-radius: 26px;
            border-top-left-radius: 10px;
          }

          .message-meta {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 10px;
          }

          .message-meta time {
            direction: ltr;
          }

          .user-text {
            margin: 0;
            white-space: pre-wrap;
            line-height: 2;
            unicode-bidi: plaintext;
          }

          .assistant-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 12px;
          }

          .assistant-summary span {
            border: 1px solid rgba(34,211,238,0.28);
            border-radius: 999px;
            padding: 5px 8px;
            background: rgba(34,211,238,0.08);
            color: #cffafe;
            font-size: 12px;
          }

          .rendered-output {
            line-height: 2;
            overflow-wrap: anywhere;
          }

          .rendered-output :where(p, li, blockquote, h1, h2, h3, h4, h5, h6) {
            text-align: start;
            unicode-bidi: plaintext;
          }

          .rendered-output :where(pre, code, kbd, samp, .katex, .katex-display) {
            direction: ltr !important;
            unicode-bidi: isolate !important;
            text-align: left;
            font-family: Consolas, Monaco, "Courier New", monospace;
          }

          .rendered-output pre,
          .raw-details pre {
            overflow: auto;
            padding: 14px;
            border-radius: 16px;
            background: rgba(0,0,0,0.42);
            border: 1px solid rgba(255,255,255,0.13);
            line-height: 1.75;
          }

          .rendered-output code {
            padding: 2px 6px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
          }

          .rendered-output pre code {
            padding: 0;
            background: transparent;
          }

          .rendered-output a {
            direction: ltr;
            unicode-bidi: isolate;
            color: #67e8f9;
          }

          .rendered-output table {
            width: 100%;
            border-collapse: collapse;
            overflow: auto;
          }

          .rendered-output th,
          .rendered-output td {
            border: 1px solid rgba(255,255,255,0.14);
            padding: 8px 10px;
          }

          .raw-details {
            margin-top: 12px;
            color: var(--muted);
          }

          .raw-details summary {
            cursor: pointer;
            color: #dbeafe;
          }

          .raw-details pre {
            white-space: pre-wrap;
            color: var(--text);
            unicode-bidi: plaintext;
          }

          .message-actions {
            margin-top: 12px;
          }

          .composer-card {
            border-radius: 28px;
            padding: 14px;
            background: rgba(5, 9, 20, 0.38);
          }

          .composer-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
          }

          .composer-head h2 {
            margin: 0;
            font-size: 17px;
          }

          .composer-head p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 13px;
          }

          .composer {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: stretch;
          }

          .composer textarea {
            min-height: 92px;
            max-height: 220px;
            resize: vertical;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 22px;
            outline: 0;
            padding: 14px 16px;
            background: rgba(0,0,0,0.28);
            color: var(--text);
            line-height: 1.9;
            direction: rtl;
            unicode-bidi: plaintext;
          }

          .send-btn {
            min-width: 104px;
            border: 0;
            border-radius: 22px;
            padding: 0 18px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            font-weight: 800;
            box-shadow: 0 18px 45px rgba(34,211,238,0.16);
          }

          .send-btn:hover {
            transform: translateY(-1px);
          }

          .toast {
            min-height: 23px;
            margin-top: 8px;
            color: #bbf7d0;
          }

          .drawer-backdrop {
            position: fixed;
            inset: 0;
            z-index: 20;
            border: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
          }

          .drawer {
            position: fixed;
            z-index: 21;
            top: 16px;
            bottom: 16px;
            right: 16px;
            width: min(470px, calc(100vw - 32px));
            border-radius: 28px;
            padding: 18px;
            transform: translateX(calc(100% + 32px));
            transition: transform 0.28s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: rgba(5,9,20,0.72);
          }

          .drawer.open {
            transform: translateX(0);
          }

          .drawer-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--line);
          }

          .drawer-head h2 {
            margin: 0;
            font-size: 23px;
          }

          .drawer-head p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 13px;
          }

          .close-btn {
            width: 38px;
            height: 38px;
            padding: 0;
            font-size: 26px;
            line-height: 1;
          }

          .drawer-tools {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            padding: 14px 0;
          }

          .drawer-tools input,
          .rename-input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 14px;
            outline: 0;
            background: rgba(0,0,0,0.26);
            color: var(--text);
            padding: 11px 12px;
          }

          .history-list {
            overflow: auto;
            display: grid;
            gap: 10px;
            padding-left: 4px;
          }

          .history-card {
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 18px;
            background: rgba(255,255,255,0.065);
            padding: 12px;
            transition: 0.18s ease;
          }

          .history-card.active,
          .history-card:hover {
            border-color: rgba(34,211,238,0.48);
            background: rgba(34,211,238,0.08);
          }

          .history-content {
            cursor: pointer;
          }

          .history-content h3 {
            margin: 0 0 7px;
            font-size: 15px;
            line-height: 1.6;
          }

          .history-content p {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.7;
          }

          .history-content small {
            display: block;
            margin-top: 7px;
            color: rgba(226,232,240,0.55);
          }

          .history-actions {
            margin-top: 10px;
          }

          .small-btn {
            padding: 7px 9px;
            border-radius: 10px;
            font-size: 12px;
          }

          .danger {
            color: #fecdd3;
            border-color: rgba(251,113,133,0.35);
          }

          .empty-state {
            border: 1px dashed rgba(255,255,255,0.22);
            border-radius: 18px;
            padding: 22px;
            color: var(--muted);
            text-align: center;
            line-height: 1.9;
          }

          @keyframes auroraMove {
            from { transform: translate3d(0, 0, 0) scale(1); }
            to { transform: translate3d(32px, -28px, 0) scale(1.12); }
          }

          @keyframes floorMove {
            from { transform: rotateX(62deg) translateY(230px) scale(1.25); opacity: 0.42; }
            to { transform: rotateX(66deg) translateY(120px) scale(1.5); opacity: 0.78; }
          }

          @keyframes ringSpin {
            from { rotate: 0deg; }
            to { rotate: 360deg; }
          }

          @keyframes float3d {
            from { transform: translate3d(0, 0, 0) rotateX(0deg) rotateY(0deg); }
            to { transform: translate3d(-18px, -30px, 80px) rotateX(20deg) rotateY(28deg); }
          }

          @keyframes neuralPulse {
            from { opacity: 0.48; filter: blur(0); }
            to { opacity: 0.8; filter: blur(0.15px); }
          }

          @keyframes codeDrift {
            from { transform: translateY(0) rotate(-9deg); opacity: 0.16; }
            to { transform: translateY(-32px) rotate(-6deg); opacity: 0.35; }
          }

          @media (max-width: 820px) {
            .page {
              padding: 12px 10px 26px;
            }

            .topbar {
              align-items: stretch;
              flex-direction: column;
              border-radius: 24px;
            }

            .top-actions {
              justify-content: flex-start;
            }

            .status-strip {
              grid-template-columns: repeat(2, 1fr);
            }

            .chat-window {
              max-height: 60vh;
              padding: 16px 10px;
              border-radius: 24px;
            }

            .message-bubble {
              width: calc(100% - 48px);
              padding: 12px;
              border-radius: 20px;
            }

            .avatar {
              width: 38px;
              height: 38px;
              border-radius: 14px;
            }

            .composer {
              grid-template-columns: 1fr;
            }

            .send-btn {
              min-height: 48px;
            }

            .composer-head {
              flex-direction: column;
            }

            .drawer-tools {
              grid-template-columns: 1fr;
            }

            .floating-chip,
            .ring {
              opacity: 0.45;
            }

            .neural-map {
              width: 300px;
              opacity: 0.42;
            }
          }

          @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
              animation-duration: 0.001ms !important;
              animation-iteration-count: 1 !important;
              scroll-behavior: auto !important;
            }
          }
          EOF_CSS

          cat > README.md <<'EOF_README'
          # RTL Markdown Fixer

          ابزار چت‌باتی برای نمایش تمیز متن فارسی راست‌به‌چپ همراه با Markdown، کد، لینک، ایمیل و فرمول LaTeX.

          ## Features

          - Chat-style Persian RTL Markdown fixer
          - Safe LTR rendering for code, links, emails, paths and formulas
          - Markdown and LaTeX rendering with copy actions
          - Local conversation history drawer
          - Search, rename, pin and delete conversations
          - Animated creative AI/code/math background
          - Dark modern UI

          ## Deploy

          This project is ready for Vercel.

          - Framework: Next.js
          - Build command: `npm run build`
          - Environment variables: none
          EOF_README

      - name: Commit chatbot UI
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/layout.tsx app/page.tsx app/globals.css README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Convert UI to chatbot layout"
            git push
          fi
